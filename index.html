            <article class="place">

                        вы увидите склоны, усыпанные соснами, горные реки и озёра. А если вы откроете в автомобиле окна,
                        сможете познакомиться с невидимым чудом здешних мест — горным
                        воздухом.
                    </p>

                        пасутся косули. И знаменитые манулы — тоже обитатели Алтайского
                        края.
                    </p>
